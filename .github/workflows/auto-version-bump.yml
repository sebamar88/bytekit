name: Auto Version Bump

on:
    pull_request:
        types: [closed]
        branches:
            - main

jobs:
    bump:
        if: github.event.pull_request.merged == true
        runs-on: ubuntu-latest
        permissions:
            contents: write
            pull-requests: read

        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0
                  # IMPORTANT: To trigger the 'Auto Release' workflow which watches for package.json changes,
                  # you should use a Personal Access Token (PAT) with 'contents: write' permissions.
                  # If you use the default GITHUB_TOKEN, the push won't trigger other workflows.
                  token: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}

            - name: Determine bump type from labels
              id: labels
              run: |
                  if [[ "${{ contains(github.event.pull_request.labels.*.name, 'release:major') || contains(github.event.pull_request.labels.*.name, 'major') }}" == "true" ]]; then
                    echo "type=major" >> $GITHUB_OUTPUT
                  elif [[ "${{ contains(github.event.pull_request.labels.*.name, 'release:minor') || contains(github.event.pull_request.labels.*.name, 'minor') }}" == "true" ]]; then
                    echo "type=minor" >> $GITHUB_OUTPUT
                  elif [[ "${{ contains(github.event.pull_request.labels.*.name, 'release:patch') || contains(github.event.pull_request.labels.*.name, 'patch') }}" == "true" ]]; then
                    echo "type=patch" >> $GITHUB_OUTPUT
                  else
                    echo "type=auto" >> $GITHUB_OUTPUT
                  fi

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 9

            - name: Install dependencies
              run: pnpm install --no-frozen-lockfile

            - name: Bump version
              env:
                  PR_BODY: ${{ github.event.pull_request.body }}
              run: node scripts/bump-version.js ${{ steps.labels.outputs.type }} "${{ github.event.pull_request.title }}"

            - name: Commit and push changes
              run: |
                  git config --global user.name "github-actions[bot]"
                  git config --global user.email "github-actions[bot]@users.noreply.github.com"

                  VERSION=$(node -p "require('./package.json').version")

                  git add package.json CHANGELOG.md
                  if [ -f package-lock.json ]; then git add package-lock.json; fi
                  if [ -f pnpm-lock.yaml ]; then git add pnpm-lock.yaml; fi

                  # Only commit if there are changes
                  if git diff --staged --quiet; then
                    echo "No changes to commit"
                  else
                    git commit -m "chore(release): bump version to $VERSION [skip ci]"
                    git push origin main
                  fi
